<section id="herramientas" class="herramientas-section">
  <h2 class="section-title">Skills & Tools</h2>

  @for (cat of categories; track cat.key) {
    <div class="category-block">
      <h3 class="category-title">
        <i [class]="cat.icon"></i> {{ cat.label }}
      </h3>
      <div class="skills-grid">
        @for (skill of getSkillsByCategory(cat.key); track skill.name) {
          <div class="skill-card">
            <div class="skill-header">
              <span class="skill-icon"><i [class]="skill.icon"></i></span>
              <span class="skill-name">{{ skill.name }}</span>
              <span class="skill-badge" [attr.data-level]="getLevelLabel(skill.level)">
                {{ getLevelLabel(skill.level) }}
              </span>
            </div>

            <div class="bar-track">
              <div
                class="bar-fill"
                [style.width.%]="getAnimatedLevel(skill.name)"
                [style.background]="skill.color"
              ></div>
              <div class="bar-segments"></div>
            </div>

            <div class="skill-footer">
              <span class="xp-label">XP</span>
              <span class="xp-value">{{ getAnimatedLevel(skill.name) }} / 100</span>
            </div>
          </div>
        }
      </div>
    </div>
  }
</section>
