<section id="stack" class="stack-section">
  <h2 class="section-title">Technical stack</h2>
  <p class="stack-intro">
    A practical overview of the technologies I use to build web and mobile products.
  </p>
  <div class="stack-grid">
    @for (area of stackAreas; track area.title) {
      <article class="stack-card">
        <h3>{{ area.title }}</h3>
        <p>{{ area.description }}</p>
        <ul>
          @for (item of area.items; track item) {
            <li>{{ item }}</li>
          }
        </ul>
      </article>
    }
  </div>
</section>
