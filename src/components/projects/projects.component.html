<section id="projects" class="projects-section">
  <h2 class="section-title">Featured projects</h2>
  <div class="projects-grid">
    @for (project of projects; track project.title) {
    <p-card [header]="project.title" class="project-card">
      
      <ng-template #header>
        <div class="avatar-wrapper">
          <img
            [src]="project.img"
            [alt]="'Screenshot of ' + project.title"
            class="avatar"
            loading="lazy"
            decoding="async"
          />
        </div>
      </ng-template>

      <p class="project-role">{{ project.role }}</p>
      <p class="project-description">{{ project.description }}</p>
      <ul class="project-highlights">
        @for (highlight of project.highlights; track highlight) {
          <li>{{ highlight }}</li>
        }
      </ul>
      <div class="tags">
        @for (tag of project.tags; track tag) {
        <p-tag
          [value]="tag"
          severity="secondary"
          [style]="{ 'background-color': 'rgb(255, 255, 255)', color: '#8b7caa' }"
        />
        }
      </div>
      <ng-template #footer>
        <div class="project-action">
          <a [href]="project.link" target="_blank" rel="noopener noreferrer">
            <p-button icon="pi pi-external-link" class="hero-btn">Live</p-button>
          </a>
          <a [href]="project.repo" target="_blank" rel="noopener noreferrer">
            <p-button icon="pi pi-github" class="hero-btn">Repo</p-button>
          </a>
        </div>
      </ng-template>

    </p-card>
    }
  </div>
</section>
