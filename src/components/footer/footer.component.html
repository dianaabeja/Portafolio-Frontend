<footer class="footer">
  <div class="footer-content">

    <div class="footer-brand">
      <span class="brand-name">Diana Bautista</span>
      <p class="brand-tagline">Software Engineer | Full Stack Developer</p>
    </div>

    <div class="footer-actions">
      <a [href]="'mailto:' + email" class="email-link">
        <i class="pi pi-envelope"></i>
        {{ email }}
      </a>
      <a href="/cv_DianaBautista.pdf" download class="footer-cta">
        Download CV
      </a>
      <a href="https://www.linkedin.com/in/dianalaurabautistagarcia/" target="_blank" rel="noopener noreferrer" class="footer-cta">
        View LinkedIn profile
      </a>
    </div>

    <div class="footer-socials">
      @for (social of socials; track social.label) {
        <a [href]="social.url" target="_blank" rel="noopener noreferrer" class="social-link" [attr.aria-label]="social.label">
          <i [class]="social.icon"></i>
        </a>
      }
    </div>

  </div>

  <div class="footer-bottom">
    <span>&copy; {{ currentYear }} Diana Bautista. All rights reserved.</span>
  </div>
</footer>
